name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Bash syntax check (query scripts)
        run: bash -n examples/queries/metrics.sh examples/queries/logs.sh

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: praetor
          POSTGRES_PASSWORD: praetor
          POSTGRES_DB: praetor
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      victoriametrics:
        image: victoriametrics/victoria-metrics:latest
        ports:
          - 8428:8428
      loki:
        image: grafana/loki:latest
        ports:
          - 3100:3100
        options: >-
          --health-cmd "wget -qO- http://localhost:3100/ready || exit 1"
          --health-interval 10s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download modules
        run: go mod download

      - name: Integration tests
        env:
          PRAETOR_TEST_DSN: postgres://praetor:praetor@localhost:5432/praetor?sslmode=disable
          TEST_POSTGRES_DSN: postgres://praetor:praetor@localhost:5432/praetor?sslmode=disable
          TEST_VM_URL: http://localhost:8428
          TEST_LOKI_URL: http://localhost:3100
        run: go test -v -tags integration -race ./internal/...
